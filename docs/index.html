<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiveWatch</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="terminal">
      <div class="terminal-header">
        <span class="dot"></span>
        <nav class="tabs" id="tabs">
          <button class="tab active" data-tab="logs">LOGS</button>
          <button class="tab" data-tab="epg">EPG</button>
        </nav>
        <span id="header-title">LiveWatch &mdash; IPTV List</span>
        <div class="lang-toggle" id="lang-toggle">
          <button class="lang-btn active" data-lang="pt">PT</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
      <div class="terminal-body" id="logs">
        <div class="log dim">[LiveWatch] Sistema pronto.</div>
      </div>
      <div class="epg-view" id="epg-view" style="display:none">
        <div class="epg-loading" id="epg-loading">
          <div class="log dim">[EPG] Carregando guia de programacao...</div>
        </div>
        <div class="epg-grid" id="epg-grid"></div>
      </div>
      <div class="progress-wrap" id="progress-wrap" style="display: none">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-label" id="progress-label"></div>
      </div>
      <div class="terminal-footer">
        <select class="profile-select" id="profile-select">
          <option value="brasil">Brasil</option>
          <option value="global">Global</option>
          <option value="iptv-org">IPTV-ORG</option>
          <option value="all">Todos</option>
        </select>
        <button class="btn btn-refresh" id="btn-update">
          &#x21BB; ATUALIZAR
        </button>
        <select class="profile-select" id="format-select">
          <option value="m3u8">M3U8</option>
          <option value="m3u">M3U</option>
        </select>
        <select class="profile-select" id="source-select">
          <option value="worker">Link curto</option>
          <option value="raw">Raw GitHub</option>
        </select>
        <button class="btn btn-copy" id="btn-copy">&#x2398; COPIAR</button>
        <button class="btn btn-download" id="btn-download">
          &#x21E9; BAIXAR
        </button>
        <span class="hint"> &#x23F1; <span id="last-updated">---</span> </span>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
